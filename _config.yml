# Site settings
title:          Yoo-SeungHyeon's Blog
description:    "Data Engineer를 준비중인 Yoo SeungHyeon 입니다."
url:            https://github.com/Yoo-SeungHyeon

# Author
author:
  name:         Yoo-SeungHyeon
  email:        effort-result@naver.com
  url:          https://yooseunghyeon.kr

# Build settings
markdown:       kramdown

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate
  # - jemoji #Uncomment this to allow emoji in your post

# Permalinks
permalink:      /:year-:month-:day/:title
paginate:       5

# Related posts settings
related_posts_section:
  max_count:        5
  min_common_tags:  2

# Links to social media
social:
  email: effort-result@naver.com
  github: https://github.com/Yoo-SeungHyeon
